<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      overflow:hidden;
    }

    .container{
      text-align:center;
      color:white;
      animation: fadeIn 2s ease;
    }

    h1{
      font-size:4rem;
      margin-bottom:15px;
      animation: slideDown 1.5s ease;
    }

    p{
      font-size:1.2rem;
      margin-bottom:25px;
      opacity:0.9;
    }

    .btn{
      display:inline-block;
      padding:12px 28px;
      background:white;
      color:#4f46e5;
      text-decoration:none;
      border-radius:30px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#111827;
      color:white;
      transform:scale(1.05);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    @keyframes slideDown{
      from{
        transform:translateY(-50px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome</h1>
    <p>Welcome to my modern website</p>
    <a href="#" class="btn">Get Started</a>
  </div>

</body>
</html>
